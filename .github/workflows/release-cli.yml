name: Release CLI Tools

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        run: |
          cd cli/target/release
          tar czf audiobook-cli-linux.tar.gz audiobook-scanner audiobook-organizer audiobook-transcriber audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-linux
          path: cli/target/release/audiobook-cli-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        shell: pwsh
        run: |
          cd cli/target/release
          Compress-Archive -Path audiobook-scanner.exe,audiobook-organizer.exe,audiobook-transcriber.exe,audiobook-splitter.exe -DestinationPath audiobook-cli-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-windows
          path: cli/target/release/audiobook-cli-windows.zip

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        run: |
          cd cli/target/release
          tar czf audiobook-cli-x86_64-apple-darwin.tar.gz audiobook-scanner audiobook-organizer audiobook-transcriber audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-x86_64-apple-darwin
          path: cli/target/release/audiobook-cli-x86_64-apple-darwin.tar.gz

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        run: |
          cd cli/target/release
          tar czf audiobook-cli-aarch64-apple-darwin.tar.gz audiobook-scanner audiobook-organizer audiobook-transcriber audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-aarch64-apple-darwin
          path: cli/target/release/audiobook-cli-aarch64-apple-darwin.tar.gz

  release:
    needs:
      - build-linux
      - build-windows
      - build-macos-x86_64
      - build-macos-aarch64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            audiobook-cli-linux/audiobook-cli-linux.tar.gz
            audiobook-cli-windows/audiobook-cli-windows.zip
            audiobook-cli-x86_64-apple-darwin/audiobook-cli-x86_64-apple-darwin.tar.gz
            audiobook-cli-aarch64-apple-darwin/audiobook-cli-aarch64-apple-darwin.tar.gz
          generate_release_notes: true
