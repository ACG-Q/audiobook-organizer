name: Release CLI Tools

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libavformat-dev libavcodec-dev libavutil-dev libswresample-dev libswscale-dev
      - name: Check formatting
        working-directory: cli
        run: cargo fmt --all --check
      - name: Run clippy
        working-directory: cli
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        working-directory: cli
        run: cargo test

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cross/Dockerfile.linux
          tags: audiobook-cross:linux
          load: true
          cache-from: type=gha,scope=cross-linux
          cache-to: type=gha,mode=max,scope=cross-linux
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build release
        working-directory: cli
        run: cross build --release --target x86_64-unknown-linux-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        run: |
          cd cli/target/x86_64-unknown-linux-gnu/release
          tar czf audiobook-cli-linux.tar.gz audiobook-scanner audiobook-organizer audiobook-transcriber audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-linux
          path: cli/target/x86_64-unknown-linux-gnu/release/audiobook-cli-linux.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cross/Dockerfile.windows
          tags: audiobook-cross:windows
          load: true
          cache-from: type=gha,scope=cross-windows
          cache-to: type=gha,mode=max,scope=cross-windows
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build release
        working-directory: cli
        run: cross build --release --target x86_64-pc-windows-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        shell: pwsh
        run: |
          cd cli/target/x86_64-pc-windows-gnu/release
          Compress-Archive -Path audiobook-scanner.exe,audiobook-organizer.exe,audiobook-transcriber.exe,audiobook-splitter.exe -DestinationPath audiobook-cli-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-windows
          path: cli/target/x86_64-pc-windows-gnu/release/audiobook-cli-windows.zip

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install ffmpeg
        run: brew install ffmpeg pkg-config
      - name: Build release
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd cli/target/${{ matrix.target }}/release
          tar czf audiobook-cli-${{ matrix.target }}.tar.gz audiobook-scanner audiobook-organizer audiobook-transcriber audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-${{ matrix.target }}
          path: cli/target/${{ matrix.target }}/release/audiobook-cli-${{ matrix.target }}.tar.gz

  release:
    needs: [check, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            audiobook-cli-linux/audiobook-cli-linux.tar.gz
            audiobook-cli-windows/audiobook-cli-windows.zip
            audiobook-cli-x86_64-apple-darwin/audiobook-cli-x86_64-apple-darwin.tar.gz
            audiobook-cli-aarch64-apple-darwin/audiobook-cli-aarch64-apple-darwin.tar.gz
          generate_release_notes: true
