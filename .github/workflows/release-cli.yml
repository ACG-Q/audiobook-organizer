name: Release CLI Tools

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - i686-pc-windows-gnu
          - aarch64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - name: Package
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $dir = "cli/target/$target/release"
          if ($target -match "windows") {
            Compress-Archive -Path "$dir/audiobook-scanner.exe","$dir/audiobook-organizer.exe","$dir/audiobook-transcriber.exe","$dir/audiobook-splitter.exe" -DestinationPath "/tmp/audiobook-cli-$target.zip"
          } else {
            tar czf "/tmp/audiobook-cli-$target.tar.gz" -C "$dir" audiobook-scanner audiobook-organizer audiobook-transcriber audiobook-splitter
          }
      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: /tmp/audiobook-cli-${{ matrix.target }}.*
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: cli/target/${{ matrix.target }}/release/audiobook-*
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: package-*/*
          generate_release_notes: true
