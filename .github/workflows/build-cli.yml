name: Build CLI Tools

on:
  push:
    branches: [master]
    paths:
      - "cli/**"
      - ".github/workflows/build-cli.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Check formatting
        working-directory: cli
        run: cargo fmt --all --check
      - name: Run clippy
        working-directory: cli
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        working-directory: cli
        run: cargo test

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-linux
          path: cli/target/release/audiobook-*
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-windows
          path: cli/target/release/audiobook-*.exe
          compression-level: 0

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-x86_64-apple-darwin
          path: cli/target/release/audiobook-*
          compression-level: 0

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-aarch64-apple-darwin
          path: cli/target/release/audiobook-*
          compression-level: 0
