name: Build CLI Tools

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Cross.toml"
      - "cross/**"
  workflow_dispatch:

jobs:
  cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cross Docker images
        run: |
          docker build -t audiobook-cross:linux -f cross/Dockerfile.linux .
          docker build -t audiobook-cross:windows -f cross/Dockerfile.windows .

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-gnu
            x86_64-pc-windows-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Linux
        run: cross build --release --target x86_64-unknown-linux-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter

      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-linux
          path: target/x86_64-unknown-linux-gnu/release/audiobook-*
          compression-level: 0

      - name: Build Windows
        run: cross build --release --target x86_64-pc-windows-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter

      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-windows
          path: target/x86_64-pc-windows-gnu/release/audiobook-*.exe
          compression-level: 0

  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          brew install ffmpeg pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build macOS
        run: cargo build --release -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter

      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-macos
          path: target/release/audiobook-*
          compression-level: 0
