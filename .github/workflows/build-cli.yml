name: Build CLI Tools

on:
  push:
    branches: [master]
    paths:
      - "cli/**"
      - ".github/workflows/build-cli.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Check formatting
        working-directory: cli
        run: cargo fmt --all --check
      - name: Run clippy
        working-directory: cli
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        working-directory: cli
        run: cargo test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Add all targets
        run: |
          rustup target add \
            x86_64-unknown-linux-gnu \
            x86_64-unknown-linux-musl \
            i686-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-pc-windows-gnu \
            i686-pc-windows-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin
      - name: Build all targets
        working-directory: cli
        run: |
          targets="x86_64-unknown-linux-gnu x86_64-unknown-linux-musl i686-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu i686-pc-windows-gnu x86_64-apple-darwin aarch64-apple-darwin"
          for t in $targets; do
            echo "::group::Building $t"
            cargo zigbuild --release --target "$t" -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
            echo "::endgroup::"
          done
      - name: Build Win7 variant
        working-directory: cli
        env:
          WIN32_WINNT: "0x0601"
        run: |
          cargo zigbuild --release --target x86_64-pc-windows-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-binaries
          path: cli/target/*/release/audiobook-*
          compression-level: 0
