name: Build CLI Tools

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Cross.toml"
      - "cross/**"
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build cross Docker images
        run: |
          docker build -t audiobook-cross:linux -f cross/Dockerfile.linux .
          docker build -t audiobook-cross:windows -f cross/Dockerfile.windows .
          docker build -t audiobook-cross:macos -f cross/Dockerfile.macos .

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-gnu
            x86_64-pc-windows-gnu
            x86_64-apple-darwin

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Linux
        run: cross build --release --target x86_64-unknown-linux-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter

      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-linux
          path: target/x86_64-unknown-linux-gnu/release/audiobook-*
          compression-level: 0

      - name: Build Windows
        run: cross build --release --target x86_64-pc-windows-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter

      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-windows
          path: target/x86_64-pc-windows-gnu/release/audiobook-*.exe
          compression-level: 0

      - name: Build macOS
        run: cross build --release --target x86_64-apple-darwin -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter

      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-macos
          path: target/x86_64-apple-darwin/release/audiobook-*
          compression-level: 0
