name: Build CLI Tools

on:
  push:
    branches: [master]
    paths:
      - "cli/**"
      - "cross/**"
      - ".github/workflows/build-cli.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libavformat-dev libavcodec-dev libavutil-dev libswresample-dev libswscale-dev
      - name: Check formatting
        working-directory: cli
        run: cargo fmt --all --check
      - name: Run clippy
        working-directory: cli
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        working-directory: cli
        run: cargo test

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cross/Dockerfile.linux
          tags: audiobook-cross:linux
          load: true
          cache-from: type=gha,scope=cross-linux
          cache-to: type=gha,mode=max,scope=cross-linux
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        working-directory: cli
        run: cross build --release --target x86_64-unknown-linux-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-linux
          path: cli/target/x86_64-unknown-linux-gnu/release/audiobook-*
          compression-level: 0

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cross/Dockerfile.windows
          tags: audiobook-cross:windows
          load: true
          cache-from: type=gha,scope=cross-windows
          cache-to: type=gha,mode=max,scope=cross-windows
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        working-directory: cli
        run: cross build --release --target x86_64-pc-windows-gnu -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-windows
          path: cli/target/x86_64-pc-windows-gnu/release/audiobook-*.exe
          compression-level: 0

  build-macos-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cross/Dockerfile.macos
          tags: audiobook-cross:macos
          load: true
          cache-from: type=gha,scope=cross-macos
          cache-to: type=gha,mode=max,scope=cross-macos
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        working-directory: cli
        run: cross build --release --target x86_64-apple-darwin -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-x86_64-apple-darwin
          path: cli/target/x86_64-apple-darwin/release/audiobook-*
          compression-level: 0

  build-macos-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cross/Dockerfile.macos-aarch64
          tags: audiobook-cross:macos-aarch64
          load: true
          cache-from: type=gha,scope=cross-macos-aarch64
          cache-to: type=gha,mode=max,scope=cross-macos-aarch64
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        working-directory: cli
        run: cross build --release --target aarch64-apple-darwin -p audiobook-scanner -p audiobook-organizer -p audiobook-transcriber -p audiobook-splitter
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-cli-aarch64-apple-darwin
          path: cli/target/aarch64-apple-darwin/release/audiobook-*
          compression-level: 0
